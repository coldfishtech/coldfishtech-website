<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coldfish Technologies</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inria+Sans:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --text-size: 1rem;
        --bg-color: #fff;
        --fg-color: #111;
        --matrix-fade: rgba(255, 255, 255, 0.08);
        --matrix-char: rgba(0, 0, 0, 0.10);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg-color: #000;
          --fg-color: #fff;
          --matrix-fade: rgba(0, 0, 0, 0.08);
          --matrix-char: rgba(255, 255, 255, 0.10);
        }
      }

      * {
        box-sizing: border-box;
        margin: 0;
      }

      body {
        font-family: "Inria Sans", sans-serif;
        font-size: var(--text-size);
        line-height: 1.7;
        color: var(--fg-color);
        background: var(--bg-color);
        min-height: 100vh;
      }

      #matrix-rain {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        pointer-events: none;
        z-index: 0;
      }

      main {
        position: relative;
        z-index: 1;
        max-width: 600px;
        margin: 0 auto;
        padding: clamp(2.5rem, 9vw, 7rem) clamp(1.25rem, 7vw, 5rem);
      }

      section + section {
        margin-top: 3.5rem;
      }

      h1,
      h2,
      h3,
      p,
      a,
      li,
      span {
        font-size: var(--text-size);
      }

      .about p + p,
      .project p + p {
        margin-top: 0.75rem;
      }

      .content-bg {
        background: var(--bg-color);
        padding: 0 0.22em;
        -webkit-box-decoration-break: clone;
        box-decoration-break: clone;
      }

      .link-with-icon {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
      }

      .project-link {
        font-weight: 700;
      }

      .outlink-icon {
        width: 1rem;
        height: 1rem;
        flex: 0 0 auto;
      }

      .project-image {
        display: block;
        width: 100%;
        margin-top: 0.9rem;
        border-radius: 0.4rem;
      }

      .project-image + p {
        margin-top: 0.85rem;
      }

      a {
        color: inherit;
        text-decoration-thickness: 1px;
        text-underline-offset: 0.15em;
      }
    </style>
  </head>
  <body>
    <canvas id="matrix-rain" aria-hidden="true"></canvas>
    <main>
      <section class="about" id="about">
        <p><span class="content-bg">Coldfish Technologies is run by Sky Yoo (유새결).</span></p>
        <p>
          <a href="mailto:sky@coldfish.tech"><span class="content-bg">sky@coldfish.tech</span></a><br />
          <a class="link-with-icon" href="https://instagram.com/coldfishtech" target="_blank" rel="noreferrer">
            <span class="content-bg">@coldfishtech</span>
            <svg class="outlink-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M14 3h7v7h-2V6.41l-9.29 9.3-1.42-1.42 9.3-9.29H14V3ZM5 5h6v2H7v10h10v-4h2v6H5V5Z"
                fill="currentColor"
              />
            </svg>
          </a>
        </p>
      </section>

      <section id="projects">
        <article class="project">
          <a class="project-link link-with-icon" href="https://soar.coldfish.tech" target="_blank" rel="noreferrer">
            <span class="content-bg">SOAR</span>
            <svg class="outlink-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M14 3h7v7h-2V6.41l-9.29 9.3-1.42-1.42 9.3-9.29H14V3ZM5 5h6v2H7v10h10v-4h2v6H5V5Z"
                fill="currentColor"
              />
            </svg>
          </a>
          <img class="project-image" src="ssoar.png" alt="SOAR project preview image" loading="lazy" />
          <p><span class="content-bg">Vertical-scrolling jumper game for SOAR, a Seoul-based event series highlighting local and international artists working with emotive Trance/Ambient music.</span></p>
        </article>
      </section>
    </main>
    <script>
      (() => {
        const canvas = document.getElementById("matrix-rain");
        const ctx = canvas.getContext("2d");
        const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        const chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz!@#$%^&*()[]{}<>+-*/=";
        const fontSize = 11;
        const columnStep = fontSize * 0.5;
        const frameStep = 45;
        let columns = 0;
        let drops = [];
        let width = window.innerWidth;
        let height = window.innerHeight;
        let lastFrame = 0;
        let matrixFade = "rgba(255, 255, 255, 0.08)";
        let matrixChar = "rgba(0, 0, 0, 0.10)";

        function randomChar() {
          return chars[Math.floor(Math.random() * chars.length)];
        }

        function syncThemeColors() {
          const styles = window.getComputedStyle(document.documentElement);
          matrixFade = styles.getPropertyValue("--matrix-fade").trim() || matrixFade;
          matrixChar = styles.getPropertyValue("--matrix-char").trim() || matrixChar;
        }

        function resize() {
          width = window.innerWidth;
          height = window.innerHeight;
          const dpr = Math.min(window.devicePixelRatio || 1, 2);
          canvas.width = Math.floor(width * dpr);
          canvas.height = Math.floor(height * dpr);
          canvas.style.width = width + "px";
          canvas.style.height = height + "px";
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          ctx.font = `${fontSize}px monospace`;
          columns = Math.ceil(width / columnStep);
          drops = Array.from({ length: columns }, () => Math.random() * height);
          ctx.clearRect(0, 0, width, height);
        }

        function drawFrame() {
          ctx.fillStyle = matrixFade;
          ctx.fillRect(0, 0, width, height);
          ctx.fillStyle = matrixChar;

          for (let i = 0; i < columns; i += 1) {
            const x = i * columnStep;
            const y = drops[i];
            ctx.fillText(randomChar(), x, y);

            if (y > height && Math.random() > 0.975) {
              drops[i] = Math.random() * -height * 0.35;
            } else {
              drops[i] += fontSize * (0.85 + Math.random() * 0.5);
            }
          }
        }

        function animate(timestamp) {
          if (prefersReducedMotion) {
            return;
          }
          if (timestamp - lastFrame >= frameStep) {
            lastFrame = timestamp;
            drawFrame();
          }
          window.requestAnimationFrame(animate);
        }

        syncThemeColors();
        resize();
        window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", () => {
          syncThemeColors();
        });
        window.addEventListener("resize", resize);
        if (!prefersReducedMotion) {
          window.requestAnimationFrame(animate);
        } else {
          drawFrame();
        }
      })();
    </script>
  </body>
</html>
